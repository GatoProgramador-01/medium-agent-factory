name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  # ── Backend: lint · typecheck ──────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type check (mypy)
        run: mypy app/
        # mypy strict=true is set in pyproject.toml

  # ── Frontend: typecheck · lint · build ────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Lint (next lint)
        run: npm run lint

      - name: Build (next build)
        # Verifies the production build compiles — catches runtime errors missed by tsc
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Build passes without a real API URL — env is not needed at build time
          NEXT_PUBLIC_API_URL: "http://localhost:8000"

  # ── Docker: verify both images build cleanly ──────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    # Only run on PRs targeting master — not on every push
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: medium-factory-api:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: medium-factory-web:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

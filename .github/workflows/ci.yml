name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  # ── Backend: lint · typecheck · unit tests ────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type check (mypy)
        run: mypy app/
        # mypy strict=true is set in pyproject.toml

      - name: Unit tests
        run: pytest tests/ --ignore=tests/e2e/ -v --timeout=30
        env:
          ANTHROPIC_API_KEY: test-key-ci
          MONGODB_URI: mongodb://localhost:27017

  # ── Backend E2E: full HTTP + real MongoDB, no LLM calls ──────────────────
  backend-e2e:
    name: Backend E2E
    runs-on: ubuntu-latest
    needs: backend-ci
    defaults:
      run:
        working-directory: backend

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand('ping').ok\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: E2E tests
        run: pytest tests/e2e/ -v --timeout=60
        env:
          ANTHROPIC_API_KEY: test-key-ci
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DATABASE: medium_factory_test

  # ── Frontend: typecheck · lint · build · unit tests ──────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Lint (next lint)
        run: npm run lint

      - name: Unit tests (Jest + RTL)
        run: npm run test:unit -- --ci --passWithNoTests
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Build (next build)
        # Verifies the production build compiles — catches runtime errors missed by tsc
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: "http://localhost:8000"

  # ── Frontend E2E: Playwright against the production build ─────────────────
  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: frontend-ci        # only run if the build passed
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Build Next.js for E2E
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: "http://localhost:8000"

      - name: Run Playwright tests
        # playwright.config.ts webServer starts `npm run start` automatically
        # All API calls are mocked via page.route() — no real backend needed
        run: npm run test:e2e
        env:
          CI: "true"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Docker: verify both images build cleanly ──────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend-ci, backend-e2e, frontend-ci]
    # Only run on PRs targeting master — not on every push
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: medium-factory-api:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: medium-factory-web:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

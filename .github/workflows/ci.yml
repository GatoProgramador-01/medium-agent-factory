name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel stale runs on the same branch/PR — saves runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Deny all permissions by default — each job grants only what it needs
permissions: {}

jobs:
  # ── Security: CVE audit + SAST ─────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Python CVE audit (pip-audit)
        working-directory: backend
        run: pip-audit

      - name: Python SAST — HIGH severity only (bandit)
        working-directory: backend
        # -lll = only HIGH severity; -iii = HIGH confidence only
        # Fails pipeline if any HIGH+HIGH finding is present
        run: bandit -r app/ -lll -iii

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: JS CVE audit (npm audit — high+ only)
        working-directory: frontend
        run: npm audit --audit-level=high

  # ── Dependency review (PRs only) ──────────────────────────────────────────
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # ── Backend: lint · typecheck · unit tests ────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type check (mypy)
        run: mypy app/

      - name: Unit tests
        run: pytest tests/ --ignore=tests/e2e/ -v --timeout=30
        env:
          ANTHROPIC_API_KEY: test-key-ci
          MONGODB_URI: mongodb://localhost:27017

  # ── Backend E2E: full HTTP + real MongoDB ──────────────────────────────────
  backend-e2e:
    name: Backend E2E
    runs-on: ubuntu-latest
    needs: backend-ci
    permissions:
      contents: read
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand('ping').ok\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: E2E tests
        run: pytest tests/e2e/ -v --timeout=60
        env:
          ANTHROPIC_API_KEY: test-key-ci
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DATABASE: medium_factory_test

  # ── Frontend: typecheck · lint · unit tests · build ───────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Lint (next lint)
        run: npm run lint

      - name: Unit tests (Jest + RTL)
        run: npm run test:unit -- --ci --passWithNoTests
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Build (next build)
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: "http://localhost:8000"

  # ── Frontend E2E: Playwright against production build ─────────────────────
  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: frontend-ci
    permissions:
      contents: read
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Build Next.js for E2E
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: "http://localhost:8000"

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: "true"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Docker: build + Trivy CVE scan ────────────────────────────────────────
  docker-build:
    name: Docker build + security scan
    runs-on: ubuntu-latest
    needs: [security, backend-ci, backend-e2e, frontend-ci]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      security-events: write   # needed to upload Trivy SARIF results
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: medium-factory-api:pr-${{ github.event.pull_request.number }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: medium-factory-api:pr-${{ github.event.pull_request.number }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: medium-factory-web:pr-${{ github.event.pull_request.number }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan frontend image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: medium-factory-web:pr-${{ github.event.pull_request.number }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

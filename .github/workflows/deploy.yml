name: deploy

on:
  # Only deploy after the full CI pipeline passes on master
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [master]
  # Manual trigger — forces a redeploy without a code change
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: true
        default: "Manual redeploy"

# Prevent two deploys from running in parallel — second one queues behind first
concurrency:
  group: deploy-production
  cancel-in-progress: false

# Deny all permissions by default
permissions: {}

jobs:
  # ── Guard: only proceed if CI passed (or manual trigger) ──────────────────
  ci-gate:
    name: CI gate check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 2
    # For workflow_run: only deploy if CI succeeded
    # For workflow_dispatch: always allow (manual override)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: CI passed — proceeding with deploy
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "CI conclusion: ${{ github.event.workflow_run.conclusion || 'N/A (manual)' }}"
          echo "Reason: ${{ github.event.inputs.reason || 'Auto-deploy on CI success' }}"

  # ── Build + push Docker images to GitHub Container Registry ───────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: ci-gate
    permissions:
      contents: read
      packages: write
    timeout-minutes: 20

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Use the SHA from the CI run that passed, not the latest HEAD
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        run: echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}/backend:latest
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}/frontend:latest
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

  # ── Security scan pushed images before deploying ──────────────────────────
  image-scan:
    name: Scan images (Trivy)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    timeout-minutes: 15

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/backend:${{ needs.build.outputs.image_tag }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/frontend:${{ needs.build.outputs.image_tag }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

  # ── Deploy backend to Railway ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend → Railway
    runs-on: ubuntu-latest
    needs: [build, image-scan]
    permissions:
      contents: read
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ vars.BACKEND_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Deploy frontend to Vercel ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend → Vercel
    runs-on: ubuntu-latest
    needs: [build, image-scan]
    permissions:
      contents: read
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ vars.FRONTEND_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

  # ── Summary ────────────────────────────────────────────────────────────────
  summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    permissions: {}
    if: always()
    timeout-minutes: 2

    steps:
      - name: Post result
        run: |
          echo "## Deployment summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend (Railway) | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Vercel) | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | \`${{ needs.build.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY

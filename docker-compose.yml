services:
  backend:
    build: ./backend
    container_name: medium-factory-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # host.docker.internal resolves to the host machine on Windows/Mac.
      # On Linux add: extra_hosts: ["host.docker.internal:host-gateway"]
      MONGODB_URI: mongodb://host.docker.internal:27017
      # When USE_LOCAL_LLM=true, point at the ollama service defined below
      LOCAL_LLM_BASE_URL: http://ollama:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: medium-factory-web
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    user: "0"   # run as root in dev so npm install can write to mounted volume
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

  # ── Local LLM (optional) ───────────────────────────────────────────────────
  # Start with: docker compose up ollama -d
  # Pull a model: docker compose exec ollama ollama pull llama3.2
  # Enable:       set USE_LOCAL_LLM=true in .env
  ollama:
    image: ollama/ollama
    container_name: medium-factory-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local-llm   # only starts when: docker compose --profile local-llm up

volumes:
  ollama_data:

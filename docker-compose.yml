services:
  backend:
    build: ./backend
    container_name: medium-factory-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # host.docker.internal resolves to the host machine on Windows/Mac.
      # On Linux add: extra_hosts: ["host.docker.internal:host-gateway"]
      MONGODB_URI: mongodb://host.docker.internal:27017
      # When USE_LOCAL_LLM=true, point at native Ollama on the Windows host
      LOCAL_LLM_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: medium-factory-web
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      # Local dev always runs in development mode.
      # The production Dockerfile runner sets NODE_ENV=production, which would be
      # inherited here and cause "npm install" to skip devDependencies (tailwindcss,
      # @tailwindcss/postcss) — breaking the CSS pipeline. Explicitly override it.
      # CI/CD never uses this compose file — it runs bare npm commands on the runner.
      NODE_ENV: development
    user: "0"   # run as root in dev — the mounted Windows volume isn't writable by UID 1001
    volumes:
      - ./frontend:/app
      - /app/node_modules   # anonymous volume isolates Linux node_modules from Windows host
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

  # ── Local LLM (optional Docker Ollama — not needed if Ollama is native) ───
  # Native Ollama on Windows is preferred: https://ollama.com/download/windows
  # After install: ollama pull llama3.2   (runs on localhost:11434 automatically)
  # Docker fallback: docker compose --profile local-llm up ollama -d
  ollama:
    image: ollama/ollama
    container_name: medium-factory-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local-llm   # only starts when: docker compose --profile local-llm up

volumes:
  ollama_data:

services:
  backend:
    build: ./backend
    container_name: medium-factory-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # host.docker.internal resolves to the host machine on Windows/Mac.
      # On Linux add: extra_hosts: ["host.docker.internal:host-gateway"]
      MONGODB_URI: mongodb://host.docker.internal:27017
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: medium-factory-web
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev
